<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>asg0</title>
</head>

<body onload="main()">
  <canvas id="example" width="400" height="400" style="background:black;"></canvas>

  <br>

  v1:
  x: <input id="v1x" type="number" value="2.25" step="any">
  y: <input id="v1y" type="number" value="2.25" step="any">

  <br><br>

  v2:
  x: <input id="v2x" type="number" value="0" step="any">
  y: <input id="v2y" type="number" value="0" step="any">

  <br><br>

  Operation:
  <select id="operation">
    <option value="add">Add</option>
    <option value="sub">Subtract</option>
    <option value="mul">Multiply</option>
    <option value="div">Divide</option>
    <option value="mag">Magnitude</option>
    <option value="norm">Normalize</option>
    <option value="angle">Angle Between</option>
    <option value="area">Area</option>
  </select>

  scalar: <input id="scalar" type="number" value="1">

  <br><br>

  <input type="button" value="Draw operation" onclick="handleDrawOperationEvent()">

  <br><br>

  <input type="button" value="Draw" onclick="handleDrawEvent()">

  <script src="lib/cuon-matrix-cse160.js"></script>
  <script src="asg0.js"></script>
</body>
</html>
